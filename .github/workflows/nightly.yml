name: CavFX Nightly Builds

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-nightly
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev

      - name: Build Linux nightly
        run: |
          make linux NIGHTLY=1 COMMIT_HASH=${GITHUB_SHA::7}

      - name: Package Linux (with preload)
        run: |
          rm -rf CavFX-nightly
          mkdir -p CavFX-nightly

          cp CavFX CavFX-nightly/CavFX
          chmod +x CavFX-nightly/CavFX

          if [ -d "src/preload" ]; then
            cp -r src/preload CavFX-nightly/preload
          else
            echo "ERROR: src/preload missing"
            exit 1
          fi

          echo "=== PACKAGED FILES ==="
          ls -R CavFX-nightly

          tar -zcvf cavfx-linux64-nightly-${GITHUB_SHA::7}.tar.gz CavFX-nightly

      - uses: actions/upload-artifact@v4
        with:
          name: cavfx-linux64-nightly-${{ github.sha }}
          path: cavfx-linux64-nightly-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows nightly
        shell: cmd
        run: |
          make mingw NIGHTLY=1 COMMIT_HASH=%GITHUB_SHA:~0,7%

      - name: Package Windows (with preload)
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force CavFX-nightly -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force CavFX-nightly

          Copy-Item CavFX.exe CavFX-nightly/CavFX.exe

          if (Test-Path "src/preload") {
            Copy-Item src/preload CavFX-nightly/preload -Recurse
          } else {
            Write-Error "src/preload missing"
            exit 1
          }

          Write-Host "=== PACKAGED FILES ==="
          Get-ChildItem -Recurse CavFX-nightly

          Compress-Archive -Path CavFX-nightly -DestinationPath "cavfx-windows-nightly-$($env:GITHUB_SHA.Substring(0,7)).zip"

      - uses: actions/upload-artifact@v4
        with:
          name: cavfx-windows-nightly-${{ github.sha }}
          path: cavfx-windows-nightly-*.zip

  publish-nightly-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: nightly-artifacts
          merge-multiple: true

      - name: Publish rolling nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes || true
          git tag -f nightly
          git push origin nightly --force

          gh release create nightly \
            nightly-artifacts/* \
            --title "CavFX Nightly" \
            --notes "Nightly build from commit ${{ github.sha }}" \
            --prerelease
