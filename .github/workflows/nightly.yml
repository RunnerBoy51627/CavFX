name: Produce nightly

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-nightly
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev

      - name: Build Linux nightly
        run: |
          make linux NIGHTLY=1 COMMIT_HASH=${GITHUB_SHA::7}

      - name: Package Linux nightly
        run: |
          mkdir -p CavFX
          cp CavFX CavFX/CavFX
          chmod +x CavFX/CavFX
          tar -zcvf cavfx-linux64-nightly-${GITHUB_SHA::7}.tar.gz CavFX

      - uses: actions/upload-artifact@v4
        with:
          name: cavfx-linux64-nightly-${{ github.sha }}
          path: cavfx-linux64-nightly-*.tar.gz